# Local development stack. Backend builds the same image CI ships (so it doubles
# as a smoke test for the prod container) and points at a real Postgres. The
# frontend runs `yarn dev` inside a plain node container with the source
# bind-mounted, so edits hot-reload without rebuilding the image. Caddy is
# intentionally omitted here — exposing each service on its own host port is
# easier for local poking than dealing with TLS/Caddy locally.
#
# To smoke-test the production frontend image, build it directly:
#   docker build -t inference-frontend ./frontend
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inference
      POSTGRES_USER: inference
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inference -d inference"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      # Host port 5532 to avoid the IPv6 :5432 binding Docker Desktop holds
      # for dev tooling, and any local Postgres install.
      - "5532:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # S3-compatible object storage for media (STT input audio; later TTS/image
  # output). Console on :9101, API on :9100 so they coexist with anything on
  # the default 9000/9001.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: inferenceclub
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-localdevminio}
    volumes:
      - minio-data:/data
    ports:
      - "9100:9000" # S3 API
      - "9101:9001" # web console (http://localhost:9101)

  # One-shot: create the media bucket once MinIO is up.
  minio-setup:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 inferenceclub ${MINIO_ROOT_PASSWORD:-localdevminio}; do echo 'waiting for minio'; sleep 2; done;
      mc mb -p local/inference-club-media || true;
      echo 'minio bucket ready';
      "

  backend:
    build:
      context: ./backend
    # Named so the prober sidecar below can reuse the exact same image.
    image: inferenceclub-backend:dev
    # GitHub OAuth creds live in backend/.env (gitignored, and excluded from
    # the image by .dockerignore) — inject them at container start. The
    # `environment:` block below would override env_file values, so the OAuth
    # keys are intentionally NOT duplicated there.
    env_file:
      - ./backend/.env
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-localdev-not-for-production}
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_URL: postgres://inference:${POSTGRES_PASSWORD:-localdev}@postgres:5432/inference
      # The compose frontend is published on :3100 — these must reference it,
      # or the browser's cross-origin API calls (and the OAuth return) break.
      DJANGO_CORS_ALLOWED_ORIGINS: "http://localhost:3100,http://127.0.0.1:3100,http://${DEV_HOST:-localhost}:3100"
      DJANGO_CSRF_TRUSTED_ORIGINS: "http://localhost:3100,http://127.0.0.1:3100,http://${DEV_HOST:-localhost}:3100"
      # GITHUB_OAUTH_CLIENT_ID / _SECRET are supplied via env_file (backend/.env).
      # Send the browser back to the compose frontend (:3100) after the handshake.
      SOCIAL_AUTH_LOGIN_REDIRECT_URL: http://localhost:3100/
      SOCIAL_AUTH_LOGIN_ERROR_URL: http://localhost:3100/login?oauth_error=1
      PORT: "8001"
      # Local-dev, no-Tailscale agent pathway: trust the address the agent
      # reports at registration and reach it directly (no SOCKS, no hostname
      # rewrite, no auth-key minting). Pairs with an agent run in AGENT_DIRECT
      # mode (see ../inference-club-agent/docker-compose.dev.yml).
      INFERENCE_DIRECT_AGENTS: "True"
      # Shared cache so rate limits + the usage meter are consistent across
      # the gunicorn workers (not per-worker).
      REDIS_URL: redis://redis:6379/0
      # Route media (STT audio etc.) to the local MinIO instead of the
      # container filesystem, so it behaves like prod.
      OBJECT_STORAGE_BUCKET: inference-club-media
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_ACCESS_KEY: inferenceclub
      OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-localdevminio}
      OBJECT_STORAGE_REGION: us-east-1
    extra_hosts:
      # So the backend can reach a direct-mode agent at
      # http://host.docker.internal:<port>/v1 on Linux too (auto on Docker
      # Desktop for Mac/Windows).
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      # Host port 8101 so this can coexist with `manage.py runserver 8001`.
      - "8101:8001"

  # Liveness prober — mirrors the prod `prober` sidecar (see
  # infra/templates/docker-compose.yml.tpl). Hits each active provider's
  # /healthz every 30s and bumps Provider.last_seen_at, so a healthy-but-idle
  # agent doesn't fall outside the 120s online window and show "offline" on
  # the dashboard between requests. Reuses the backend image, different command.
  # No TAILNET_PROXY_URL in dev → it probes agents directly at
  # host.docker.internal:<port> (hence extra_hosts).
  prober:
    image: inferenceclub-backend:dev
    restart: unless-stopped
    command: ["python", "manage.py", "probe_providers", "--interval", "30"]
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-localdev-not-for-production}
      DJANGO_DEBUG: "True"
      DATABASE_URL: postgres://inference:${POSTGRES_PASSWORD:-localdev}@postgres:5432/inference
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started

  # Async job execution (PRD 10). The worker runs queued jobs; beat fires the
  # dispatcher tick that claims work and assigns it to providers with free
  # capacity. Both reuse the backend image (so a backend code change means
  # rebuilding these too) with a different command, and share the same storage
  # + direct-agent + Redis config the backend uses so a worker can reach agents
  # and persist generated media exactly like the web process.
  celery-worker:
    image: inferenceclub-backend:dev
    restart: unless-stopped
    command: ["celery", "-A", "backend", "worker", "-l", "info", "--concurrency=4"]
    env_file:
      - ./backend/.env
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-localdev-not-for-production}
      DATABASE_URL: postgres://inference:${POSTGRES_PASSWORD:-localdev}@postgres:5432/inference
      REDIS_URL: redis://redis:6379/0
      INFERENCE_DIRECT_AGENTS: "True"
      OBJECT_STORAGE_BUCKET: inference-club-media
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_ACCESS_KEY: inferenceclub
      OBJECT_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-localdevminio}
      OBJECT_STORAGE_REGION: us-east-1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  celery-beat:
    image: inferenceclub-backend:dev
    restart: unless-stopped
    # -s writes the schedule DB to /tmp; the app user can't write the /app cwd.
    command: ["celery", "-A", "backend", "beat", "-l", "info", "-s", "/tmp/celerybeat-schedule"]
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-localdev-not-for-production}
      DATABASE_URL: postgres://inference:${POSTGRES_PASSWORD:-localdev}@postgres:5432/inference
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      # The dev stage runs `yarn install` against the bind-mounted source on
      # first start and then `yarn dev`. The default (`runtime`) stage is what
      # CI ships to prod.
      target: dev
    environment:
      # Browser hits backend on the host's compose port 8101. DEV_HOST (root
      # .env, written by scripts/dev-mobile.sh) swaps in the Mac's LAN IP so
      # phones on the same WiFi can reach the API too; unset = localhost.
      NUXT_PUBLIC_API_BASE: http://${DEV_HOST:-localhost}:8101
      # SSR (inside this container) can't reach localhost:8101 — that's the
      # frontend itself. Reach the backend by its compose service name instead.
      NUXT_API_BASE_INTERNAL: http://backend:8001
      # Nuxt listens on :3000 inside the container but the browser loads the app
      # from the host-published :3100. Tell Vite's HMR client to connect on the
      # published port; otherwise its WebSocket targets the unpublished :3000,
      # fails, and retries in a loop (sluggish UI + console ws errors). Must
      # match the host side of the 3100:3000 port mapping below.
      NUXT_VITE_HMR_CLIENT_PORT: "3100"
    volumes:
      - ./frontend:/app
      # Named volume shadows the host's frontend/node_modules — the host
      # installs are darwin/arm64 binaries and won't run inside an alpine/linux
      # container, so the container needs its own.
      - frontend-node-modules:/app/node_modules
    depends_on:
      - backend
    ports:
      # Host port 3100 so this can coexist with `yarn dev --port 3001` and
      # whatever Docker Desktop has on :3000.
      - "3100:3000"

volumes:
  postgres-data:
  frontend-node-modules:
  minio-data:
