# Production stack config.
# Secrets (--secret) are set by the GitHub Actions workflow at run time from
# repo secrets, so this file stays in git unchanged. The keys the program
# reads:
#
# Required (set by workflow from GitHub repo secrets):
#   inference-club-infra:hcloudToken   <- HCLOUD_TOKEN
#   inference-club-infra:ghcrToken     <- GHCR_TOKEN
#
# Optional (only needed once you want GitHub OAuth login working in prod):
#   inference-club-infra:githubOauthClientId
#   inference-club-infra:githubOauthClientSecret
#
# Auto-generated by Pulumi resources (no input needed):
#   SSH keypair, DJANGO_SECRET_KEY, POSTGRES_PASSWORD
config:
  inference-club-infra:domain: inference.club
  inference-club-infra:hcloudLocation: nbg1
  inference-club-infra:serverType: cx22
  inference-club-infra:backendImage: ghcr.io/inference-club/inference-club-backend:latest
  inference-club-infra:frontendImage: ghcr.io/inference-club/inference-club-frontend:latest
