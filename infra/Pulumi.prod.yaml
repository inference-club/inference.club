# Production stack config. Secrets are set with `pulumi config set --secret <key> <value>`
# and are encrypted at rest in this file. The keys below are the ones the
# program reads; commented lines show what each value should look like.
config:
  inference-club-infra:domain: inference.club
  inference-club-infra:hcloudLocation: nbg1
  inference-club-infra:serverType: cx22
  inference-club-infra:backendImage: ghcr.io/inference-club/inference-club-backend:latest
  inference-club-infra:frontendImage: ghcr.io/inference-club/inference-club-frontend:latest
  # Set with: pulumi config set --secret <key> <value>
  # inference-club-infra:hcloudToken: <hetzner cloud api token>
  # inference-club-infra:sshPublicKey: <contents of ~/.ssh/id_ed25519.pub>
  # inference-club-infra:sshPrivateKey: <contents of ~/.ssh/id_ed25519> (only needed when CI runs pulumi up)
  # inference-club-infra:djangoSecretKey: <random 50-char string>
  # inference-club-infra:postgresPassword: <random>
  # inference-club-infra:githubOauthClientId: <from github oauth app>
  # inference-club-infra:githubOauthClientSecret: <from github oauth app>
  # inference-club-infra:ghcrUsername: <github username with read:packages>
  # inference-club-infra:ghcrToken: <github personal access token, classic, with read:packages>
