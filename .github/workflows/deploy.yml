name: deploy

# Rolls a built image SHA out to the production Hetzner VPS via Pulumi.
# Triggers:
#   - automatically when build-and-push completes successfully on main
#   - manually via workflow_dispatch (for re-deploys / rollbacks)
#
# Gated by the `production` GitHub environment so you can require manual
# approval if you want — toggle that in the repo's Settings → Environments.
on:
  workflow_run:
    workflows: ["build-and-push"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_sha:
        description: "Short image SHA tag to deploy (e.g. sha-abc1234). Leave blank to use :latest."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_sha }}" ]; then
            echo "tag=${{ inputs.image_sha }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            short=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
            echo "tag=sha-$short" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - run: npm ci

      - uses: pulumi/actions@v6
        with:
          command: up
          stack-name: prod
          work-dir: infra
          # Override the image refs at deploy time so this workflow doesn't
          # have to mutate Pulumi.prod.yaml.
          config-map: |
            inference-club-infra:backendImage: { value: "ghcr.io/inference-club/inference-club-backend:${{ steps.tag.outputs.tag }}" }
            inference-club-infra:frontendImage: { value: "ghcr.io/inference-club/inference-club-frontend:${{ steps.tag.outputs.tag }}" }
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
