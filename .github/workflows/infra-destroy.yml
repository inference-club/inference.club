name: infra-destroy

# Tears the entire production stack down. Manual trigger only, with a typed
# confirmation that has to match the literal string "destroy" — this is the
# minimum friction guard against pushing the wrong button.
#
# This deletes the Hetzner VPS and all bind-mounted data on it (Postgres
# included). The Pulumi state is preserved, so a subsequent `infra-deploy`
# brings up a fresh server and starts over.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" (lowercase) to confirm.'
        required: true
        default: ""

permissions:
  contents: read

concurrency:
  group: infra-prod
  cancel-in-progress: false

jobs:
  destroy:
    if: ${{ inputs.confirm == 'destroy' }}
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - run: npm ci

      - uses: pulumi/actions@v6
        with:
          command: destroy
          stack-name: prod
          upsert: true
          work-dir: infra
          # Same single-line / env-var split as infra-deploy.yml — see comments there.
          config-map: |
            inference-club-infra:ghcrToken: { value: "${{ secrets.GHCR_TOKEN }}", secret: true }
            inference-club-infra:sshPublicKey: { value: "${{ secrets.DEPLOY_SSH_PUBLIC_KEY }}", secret: true }
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          # Needed so the GCP provider can run; the media buckets themselves
          # are retainOnDelete and survive a destroy (user data).
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
