name: infra-deploy

# Provisions (or reconciles) the Hetzner VPS and rolls out the latest images
# via Pulumi. Two triggers:
#   - workflow_dispatch        : the "deploy now" button. First run is the
#                                infra-up; later runs reconcile config/image
#                                changes.
#   - workflow_run (build-push) : auto-deploy app updates after CI builds new
#                                 images on push to main.
#
# Required GitHub repo secrets:
#   HCLOUD_TOKEN          - Hetzner Cloud API token (Read & Write)
#   GHCR_TOKEN            - GitHub PAT (classic, scope: read:packages) so the
#                           VPS can pull private images from GHCR
#   PULUMI_ACCESS_TOKEN   - https://app.pulumi.com/account/tokens
#
# Optional repo secrets (skip until you want OAuth login working in prod):
#   GH_OAUTH_CLIENT_ID
#   GH_OAUTH_CLIENT_SECRET
on:
  workflow_dispatch:
    inputs:
      image_sha:
        description: "Image tag to deploy (e.g. sha-abc1234). Blank = :latest."
        required: false
        default: ""
  workflow_run:
    workflows: ["build-and-push"]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  # Serialize all infra changes so two runs can't fight over the same VPS.
  group: infra-prod
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_sha }}" ]; then
            echo "tag=${{ inputs.image_sha }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            short=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
            echo "tag=sha-$short" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: infra/package-lock.json

      - run: npm ci

      - uses: pulumi/actions@v6
        with:
          command: up
          stack-name: prod
          # Create the stack on first run; no-op afterwards.
          upsert: true
          work-dir: infra
          # Inject required + optional secrets at deploy time. Auto-generated
          # SSH/Django/Postgres secrets are produced inside the program.
          config-map: |
            inference-club-infra:ghcrToken: { value: "${{ secrets.GHCR_TOKEN }}", secret: true }
            inference-club-infra:githubOauthClientId: { value: "${{ secrets.GH_OAUTH_CLIENT_ID }}", secret: true }
            inference-club-infra:githubOauthClientSecret: { value: "${{ secrets.GH_OAUTH_CLIENT_SECRET }}", secret: true }
            inference-club-infra:backendImage: { value: "ghcr.io/inference-club/inference-club-backend:${{ steps.tag.outputs.tag }}" }
            inference-club-infra:frontendImage: { value: "ghcr.io/inference-club/inference-club-frontend:${{ steps.tag.outputs.tag }}" }
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          # The hcloud Pulumi provider reads HCLOUD_TOKEN from the env, not
          # from Pulumi config. Same value, different delivery mechanism.
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
